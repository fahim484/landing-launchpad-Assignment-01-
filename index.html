<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 1</title>
    <!--? Google Fonts Start -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!--? Google Fonts End -->

    <!--? Link to CSS File Start -->
    <link rel="stylesheet" href="css/style.css" />
    <!--? Link to CSS File End -->
  </head>
  <body>
    <!-- Header Content Section Start -->
    <header class="header-section">
      <section class="container">
        <!-- Navbar/Navigation Content Section Start -->
        <nav class="navbar">
          <div class="logo nav-title inter-normal">
            <h1 class="small-logo"><a href="#">LOGO</a></h1>
          </div>
          <div class="signup-button">
            <button class="primary-btn">Sign Up</button>
          </div>
        </nav>
        <!-- Navbar/Navigation Content Section End -->

        <!-- Banner/Herobox Content Section Start -->
        <section class="banner-section">
          <h1 class="raleway-normal">
            Cool Dark UI Template for <br />
            Webflow Agencies!
          </h1>
          <button class="primary-btn">Stay Focused</button>
        </section>
        <!-- Banner/Herobox Content Section End -->
      </section>
    </header>
    <!-- Header Content Section End -->

    <!-- Main Content Section Start -->
    <main class="main-section container">

      <!-- Action Content Section Start -->
      <section class="action-section">
        <div class="action-content-left">
          <h2 class="raleway-normal section-title">Get Started Today</h2>
          <p class="raleway-normal">
            Explore the live preview and imagine your <br> brand in this bold new look.
          </p>
          <button class="primary-btn">Launch Live Preview</button>
        </div>
        <div class="action-content-right">
          <img src="assets/wc-mini.png" alt="Action Image" />
        </div>
      </section>
      <!-- Action Content Section End -->

    </main>
    <!-- Main Content Section End -->

    <!-- Footer Content Section Start -->
    <footer></footer>
    <!-- Footer Content Section End -->
  </body>
</html>
